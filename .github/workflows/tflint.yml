name: tflint

on:
  pull_request:
  push:
    branches:
      - main

permissions:
  contents: read

jobs:
  tflint:
    name: ${{ matrix.root }}
    runs-on: ubuntu-latest

    strategy:
      fail-fast: false
      matrix:
        root:
          - github/chikachow
          - github/cysp

    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3

      - uses: terraform-linters/setup-tflint@b480b8fcdaa6f2c577f8e4fa799e89e756bb7c93 # v6.2.2

      - run: tflint --chdir="${{ matrix.root }}" --format=compact

  required:
    name: tflint
    runs-on: ubuntu-latest
    needs: tflint
    if: ${{ always() }}

    steps:
      - run: |
          if [ "${{ needs.tflint.result }}" != "success" ]; then
            exit 1
          fi
